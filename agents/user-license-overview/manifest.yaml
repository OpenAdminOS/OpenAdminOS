# yaml-language-server: $schema=../../schemas/agent-template.schema.json
descriptor:
  id: user-license-overview
  name: User license overview
  description: Reviews tenant user licensing hygiene by usage location, account state, and assigned-license presence.
  version: 1.1.0
  minAppVersion: 0.1.0
  author:
    name: OpenAdminOS
    handle: openadminos
    verified: true
  category: apps
  tier: dashboard
  requiresEntraTier: free
  mode: read
  preferredModel: llama3.1:8b
skills:
  - id: load_users
    format: graph
    label: Load tenant users
    detail: Reads the tenant's users via Microsoft Graph.
    settings:
      method: GET
      path: /users
      select:
        - id
        - displayName
        - userPrincipalName
        - usageLocation
        - accountEnabled
        - assignedLicenses
        - userType
      scopes:
        - User.Read.All
  - id: by_location
    format: transform
    label: Count users by usage location
    settings:
      kind: group-by-field
      source: "{{ load_users.output }}"
      field: usageLocation
      missing: "(unset)"

  - id: by_account_enabled
    format: transform
    label: Count users by account state
    settings:
      kind: count-by-field
      source: "{{ load_users.output }}"
      field: accountEnabled

  - id: by_user_type
    format: transform
    label: Count users by user type
    settings:
      kind: count-by-field
      source: "{{ load_users.output }}"
      field: userType

  - id: missing_usage_location
    format: transform
    label: Find users missing usage location
    detail: Groups users whose usageLocation is unset, which can block license assignment.
    settings:
      kind: group-by-field
      source: "{{ load_users.output }}"
      field: usageLocation
      missing: "(unset)"
  - id: summarize
    format: llm
    label: Summarize licensing posture
    detail: Compact summary highlighting country buckets and license-readiness gaps.
    settings:
      system: >-
        You are a Microsoft 365 licensing hygiene reviewer. Be concise and
        factual. Never invent numbers - use only the figures you are given.
        Do not infer exact product license names from assignedLicenses here;
        this agent only checks user-level readiness signals.
      prompt: |-
        Total users: {{ load_users.output | size }}.
        By usage location: {{ by_location.output }}.
        By account state: {{ by_account_enabled.output }}.
        By user type: {{ by_user_type.output }}.
        Users by usage location, with unset bucket included: {{ missing_usage_location.output }}.

        Write a compact report with these sections:
        1. Main finding.
        2. Licensing readiness signals.
        3. Recommended next actions.

        Highlight the largest location buckets, unset usage locations, and
        disabled/guest population caveats.
      temperature: 0.2
      maxTokens: 360
definition:
  triggers:
    - id: manual
      kind: manual
  result:
    summary: '{{ summarize.output.text | default("Summary unavailable.") }}'
    data:
      total: "{{ load_users.output | size }}"
      byLocation: "{{ by_location.output }}"
      byAccountEnabled: "{{ by_account_enabled.output }}"
      byUserType: "{{ by_user_type.output }}"
      usageLocationBuckets: "{{ missing_usage_location.output }}"
      llmSummary: "{{ summarize.output.text }}"
      llmModel: "{{ summarize.output.model }}"
