# yaml-language-server: $schema=../../schemas/agent-template.schema.json
#
# sign-in-failure-explainer — pulls recent failed sign-ins from the
# tenant and asks the LLM to cluster them by likely root cause. The
# value is the *grouping*: 200 failures, 80% are the same error code
# for the same app, vs. 200 failures spread across 50 different causes
# — that's the difference between a known issue and a fire.
descriptor:
  id: sign-in-failure-explainer
  name: Sign-in failure explainer
  description: Clusters recent failed sign-ins by error, app, user, client app, Conditional Access status, and location signals.
  version: 1.1.0
  minAppVersion: 0.1.0
  author:
    name: OpenAdminOS
    handle: openadminos
    verified: true
  category: policies
  tier: agent
  requiresEntraTier: p1
  mode: read
  preferredModel: llama3.1:8b

skills:
  - id: load_failures
    format: graph
    label: Load recent failed sign-ins
    detail: Reads sign-in failures from the last 24 hours.
    settings:
      method: GET
      path: /auditLogs/signIns
      query:
        $filter: "status/errorCode ne 0"
        $top: "200"
        $orderby: createdDateTime desc
      # Combining $filter on a complex sub-property with $orderby on the
      # signIns collection requires advanced-query consistency. Microsoft
      # Graph returns 400 without this header in several regions.
      headers:
        ConsistencyLevel: eventual
      select:
        - id
        - createdDateTime
        - userPrincipalName
        - appDisplayName
        - status
        - clientAppUsed
        - ipAddress
        - location
        - conditionalAccessStatus
        - riskLevelAggregated
        - riskLevelDuringSignIn
      scopes:
        - AuditLog.Read.All

  - id: by_error
    format: transform
    label: Count failures by error code
    settings:
      kind: count-by-field
      source: "{{ load_failures.output }}"
      field: status.errorCode

  - id: by_app
    format: transform
    label: Count failures by app
    settings:
      kind: count-by-field
      source: "{{ load_failures.output }}"
      field: appDisplayName

  - id: by_user
    format: transform
    label: Count failures by user
    settings:
      kind: count-by-field
      source: "{{ load_failures.output }}"
      field: userPrincipalName

  - id: by_client_app
    format: transform
    label: Count failures by client app
    settings:
      kind: count-by-field
      source: "{{ load_failures.output }}"
      field: clientAppUsed

  - id: by_ca_status
    format: transform
    label: Count failures by Conditional Access status
    settings:
      kind: count-by-field
      source: "{{ load_failures.output }}"
      field: conditionalAccessStatus

  - id: by_risk_during_sign_in
    format: transform
    label: Count failures by sign-in risk level
    settings:
      kind: count-by-field
      source: "{{ load_failures.output }}"
      field: riskLevelDuringSignIn

  - id: recent_sample
    format: transform
    label: Sample recent failures
    detail: Keeps the newest failures available as evidence for clustering.
    settings:
      kind: sort-by
      source: "{{ load_failures.output }}"
      field: createdDateTime
      direction: desc
      take: 20

  - id: explain
    format: llm
    label: Cluster failures by likely root cause
    detail: Top-three clusters with reasoning and triage suggestion.
    settings:
      system: >-
        You are an Entra sign-in investigator. Be concise and factual.
        Never invent error codes or counts — only reference the
        figures you are given. Group failures by *root cause*, not
        just by error code (e.g. "CA policy requires compliant
        device" combines AADSTS53000 + AADSTS53003). Be conservative
        about claiming compromise — most failures are not malicious.
      prompt: |-
        {{ load_failures.output | size }} sign-in failures in the
        last 24 hours.

        Top error codes: {{ by_error.output }}
        Top apps: {{ by_app.output }}
        Top users: {{ by_user.output }}
        Top client apps: {{ by_client_app.output }}
        Conditional Access status: {{ by_ca_status.output }}
        Risk during sign-in: {{ by_risk_during_sign_in.output }}
        Recent failure sample: {{ recent_sample.output }}

        Write a compact report with these sections:
        1. Main finding.
        2. Likely root-cause clusters.
        3. Recommended next actions.

        For each cluster, name the affected users/apps when visible and choose
        a triage path: ignore known issue, user education, check device
        compliance posture, review CA policy, reset credentials, or escalate
        to incident response.

        If the failures don't cluster cleanly (e.g. all distinct
        causes), say so honestly.
      temperature: 0.2
      maxTokens: 600

definition:
  triggers:
    - id: manual
      kind: manual
  result:
    summary: '{{ explain.output.text | default("Summary unavailable.") }}'
    data:
      total: "{{ load_failures.output | size }}"
      byError: "{{ by_error.output }}"
      byApp: "{{ by_app.output }}"
      byUser: "{{ by_user.output }}"
      byClientApp: "{{ by_client_app.output }}"
      byConditionalAccessStatus: "{{ by_ca_status.output }}"
      byRiskDuringSignIn: "{{ by_risk_during_sign_in.output }}"
      recentSample: "{{ recent_sample.output }}"
      llmSummary: "{{ explain.output.text }}"
      llmModel: "{{ explain.output.model }}"
