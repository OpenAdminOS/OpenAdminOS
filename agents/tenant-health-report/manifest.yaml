# yaml-language-server: $schema=../../schemas/agent-template.schema.json
#
# Agent Template manifest for tenant-health-report.
#
# Reads the Intune managed-device inventory, tallies devices by
# compliance state, asks the LLM for a one-paragraph executive
# summary, and posts the summary to a Microsoft Teams channel via
# the Teams connector. The Teams post fires only when the
# connector is configured AND the user approves the preview-and-send
# modal.
#
# Demonstrates:
#   - declaring a connector dependency via `descriptor.connectors`
#   - templating capability args from earlier pipeline output
#   - the `format: connector` step (kind: notify → preview-and-send modal)

descriptor:
  id: tenant-health-report
  name: Tenant health report
  description: Posts a one-paragraph Intune compliance summary to a Microsoft Teams channel each time it runs.
  version: 1.0.0
  author:
    name: OpenAdminOS
    handle: openadminos
    verified: true
  category: compliance
  tier: dashboard
  requiresEntraTier: free
  mode: read
  preferredModel: llama3.1:8b
  # Declared connector dependency. Required: the run fails preflight if
  # the Teams connector cannot be built (no tenant, scope consent
  # declined, etc.). The user re-consents inline the first time the
  # capability fires — see per-capability incremental consent in
  # docs/SPEC.md §2 Connector abstraction.
  connectors:
    - id: teams
      minVersion: 1.0.0
      capabilities:
        - { id: post-channel-message, version: 1 }
      required: true

# ─── pipeline ──────────────────────────────────────────────────────────────
skills:

  # 1) Load the managed-device inventory.
  - id: load_devices
    format: graph
    label: Load managed device inventory
    detail: Reads managedDevices from the active tenant.
    settings:
      method: GET
      path: /deviceManagement/managedDevices
      select:
        - id
        - deviceName
        - userPrincipalName
        - operatingSystem
        - complianceState
        - lastSyncDateTime
      scopes:
        - DeviceManagementManagedDevices.Read.All

  # 2) Bucket the devices by complianceState.
  - id: by_state
    format: transform
    label: Count devices by compliance state
    detail: Tabulates compliant / noncompliant / unknown counts.
    settings:
      kind: count-by-field
      source: "{{ load_devices.output }}"
      field: complianceState
      buckets:
        - compliant
        - noncompliant
        - unknown

  # 3) LLM summary — what gets posted.
  - id: summarize
    format: llm
    label: Summarize tenant health
    detail: One-paragraph compliance posture, written to live in a Teams channel.
    settings:
      system: >-
        You are a Microsoft 365 administrator's assistant writing a short
        compliance update for the team's Teams channel. Plain English,
        no exclamation marks, no marketing language. One paragraph max.
        Never invent figures — use only the counts you are given.
      prompt: |-
        Tenant managed devices: {{ load_devices.output | size }}.
        Compliant: {{ by_state.output.compliant }}.
        Noncompliant: {{ by_state.output.noncompliant }}.
        Unknown: {{ by_state.output.unknown }}.

        Write a one-paragraph compliance summary the IT team can read in
        Teams. Lead with the biggest risk if any, then a single
        prioritised action. Reference the actual counts.
      temperature: 0.2
      maxTokens: 220

  # 4) Post the summary to Teams. `kind: notify` so the runtime gates
  #    this call with the preview-and-send confirmation modal — the
  #    user sees the rendered markdown and the target channel before
  #    anything fires. teamId/channelId fall back to the Teams
  #    connector's saved defaults (set on the Connectors page); the
  #    agent only needs to supply the body.
  - id: post_to_teams
    format: connector
    label: Post summary to Teams
    detail: Sends the LLM-generated summary to the configured channel.
    settings:
      connector: teams
      capability: post-channel-message
      version: 1
      args:
        markdown: |-
          ## Tenant health report

          {{ summarize.output.text }}

          ---
          Counts: {{ by_state.output.compliant }} compliant · {{ by_state.output.noncompliant }} noncompliant · {{ by_state.output.unknown }} unknown · {{ load_devices.output | size }} total.

# ─── what makes it an agent ────────────────────────────────────────────────
definition:
  triggers:
    - id: manual
      kind: manual

  # No per-install settings required. The Teams connector's saved
  # default team + channel (set on the Connectors page) is the
  # target; an admin who wants this agent to post somewhere different
  # can either change the connector default or override `args.teamId`
  # and `args.channelId` on the connector step above.

  # Shape of the run record's `result` field.
  result:
    summary: >-
      Posted Intune health summary to Teams: {{ by_state.output.compliant }}
      compliant, {{ by_state.output.noncompliant }} noncompliant,
      {{ by_state.output.unknown }} unknown.
    data:
      totalDevices: "{{ load_devices.output | size }}"
      counts:
        compliant: "{{ by_state.output.compliant }}"
        noncompliant: "{{ by_state.output.noncompliant }}"
        unknown: "{{ by_state.output.unknown }}"
      teamsMessage:
        messageId: "{{ post_to_teams.output.messageId }}"
        webUrl: "{{ post_to_teams.output.webUrl }}"
      llmSummary: "{{ summarize.output.text }}"
      llmModel: "{{ summarize.output.model }}"
