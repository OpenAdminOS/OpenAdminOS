# yaml-language-server: $schema=../../schemas/agent-template.schema.json
#
# Agent Template manifest for tenant-health-report.
#
# Reads the Intune managed-device inventory, tallies compliance and
# inventory freshness signals, and asks the LLM for a concise tenant
# health report. Delivery to Teams is configured at the app's per-agent
# delivery layer, not hard-wired into this agent.

descriptor:
  id: tenant-health-report
  name: Tenant health report
  description: Summarizes Intune tenant health from compliance, OS, ownership, and stale inventory signals for scheduled or manual review.
  version: 1.1.0
  author:
    name: OpenAdminOS
    handle: openadminos
    verified: true
  category: compliance
  tier: dashboard
  requiresEntraTier: free
  mode: read
  preferredModel: llama3.1:8b

# ─── pipeline ──────────────────────────────────────────────────────────────
skills:

  # 1) Load the managed-device inventory.
  - id: load_devices
    format: graph
    label: Load managed device inventory
    detail: Reads managedDevices from the active tenant.
    settings:
      method: GET
      path: /deviceManagement/managedDevices
      select:
        - id
        - deviceName
        - userPrincipalName
        - operatingSystem
        - complianceState
        - lastSyncDateTime
        - managedDeviceOwnerType
        - deviceEnrollmentType
        - managementState
      scopes:
        - DeviceManagementManagedDevices.Read.All

  # 2) Bucket the devices by complianceState.
  - id: by_state
    format: transform
    label: Count devices by compliance state
    detail: Tabulates compliant / noncompliant / unknown counts.
    settings:
      kind: count-by-field
      source: "{{ load_devices.output }}"
      field: complianceState
      buckets:
        - compliant
        - noncompliant
        - unknown

  - id: by_os
    format: transform
    label: Count devices by operating system
    detail: Shows whether tenant health issues are concentrated by platform.
    settings:
      kind: count-by-field
      source: "{{ load_devices.output }}"
      field: operatingSystem

  - id: by_owner_type
    format: transform
    label: Count devices by ownership
    detail: Separates corporate and personal device ownership where Graph provides it.
    settings:
      kind: count-by-field
      source: "{{ load_devices.output }}"
      field: managedDeviceOwnerType

  - id: stale_inventory
    format: transform
    label: Find stale inventory records
    detail: Flags devices whose Intune inventory has not refreshed recently.
    settings:
      kind: filter-by-age
      source: "{{ load_devices.output }}"
      timestampField: lastSyncDateTime
      inactiveDaysAtLeast: "{{ settings.staleSyncDays }}"

  # 3) LLM summary — what gets posted.
  - id: summarize
    format: llm
    label: Summarize tenant health
    detail: Compact tenant-health report suitable for Activity, schedules, or Teams delivery.
    settings:
      system: >-
        You are an Intune tenant health reviewer. Plain English, no
        exclamation marks, no marketing language. Never invent figures - use
        only the counts you are given. Treat stale inventory as a data-quality
        caveat before making compliance claims.
      prompt: |-
        Tenant managed devices: {{ load_devices.output | size }}.
        Compliant: {{ by_state.output.compliant }}.
        Noncompliant: {{ by_state.output.noncompliant }}.
        Unknown: {{ by_state.output.unknown }}.
        By OS: {{ by_os.output }}.
        By ownership: {{ by_owner_type.output }}.
        Stale inventory >= {{ settings.staleSyncDays }} days: {{ stale_inventory.output | size }}.

        Write a compact report with these sections:
        1. Main finding.
        2. Health signals.
        3. Recommended next action.

        Lead with the biggest risk if any. If unknown or stale inventory is
        material, make refreshing/checking device sync the first action.
      temperature: 0.2
      maxTokens: 360

# ─── what makes it an agent ────────────────────────────────────────────────
definition:
  settings:
    - id: staleSyncDays
      label: Stale inventory threshold (days)
      type: integer
      default: 14
      description: Devices that have not synced for at least this many days are flagged as stale inventory.

  triggers:
    - id: manual
      kind: manual

  # Shape of the run record's `result` field.
  result:
    summary: >-
      {{ summarize.output.text | default("Summary unavailable.") }}
    data:
      totalDevices: "{{ load_devices.output | size }}"
      counts:
        compliant: "{{ by_state.output.compliant }}"
        noncompliant: "{{ by_state.output.noncompliant }}"
        unknown: "{{ by_state.output.unknown }}"
      byOs: "{{ by_os.output }}"
      byOwnerType: "{{ by_owner_type.output }}"
      staleInventoryCount: "{{ stale_inventory.output | size }}"
      llmSummary: "{{ summarize.output.text }}"
      llmModel: "{{ summarize.output.model }}"
      thresholds:
        staleSyncDays: "{{ settings.staleSyncDays }}"
