# yaml-language-server: $schema=../../schemas/agent-template.schema.json
#
# Agent Template manifest for find-inactive-devices.
#
# The runtime interprets this YAML top-to-bottom. Each `skill` is one step in
# the pipeline; outputs are addressed by skill id elsewhere in the manifest
# (e.g. `{{ load_devices.output }}`). The manifest is the only source of truth
# for what this agent does — there is no companion TypeScript code.

descriptor:
  id: find-inactive-devices
  name: Find inactive devices
  description: Reviews Intune-managed device inactivity by sync age, compliance, OS, ownership, and enrollment signals with review-first cleanup guidance.
  version: 1.1.0
  minAppVersion: 0.1.0
  author:
    name: OpenAdminOS
    handle: openadminos
    verified: true
  category: devices
  requiresEntraTier: free
  mode: read
  preferredModel: llama3.1:8b

# ─── pipeline ──────────────────────────────────────────────────────────────
skills:

  # 1) Read managedDevices from the active tenant.
  - id: load_devices
    format: graph
    label: Load managed device inventory
    detail: Reads managedDevices from the active tenant.
    settings:
      method: GET
      path: /deviceManagement/managedDevices
      select:
        - id
        - deviceName
        - userPrincipalName
        - operatingSystem
        - osVersion
        - lastSyncDateTime
        - enrolledDateTime
        - complianceState
        - managementState
        - managedDeviceOwnerType
        - deviceEnrollmentType
        - manufacturer
        - model
      scopes:
        - DeviceManagementManagedDevices.Read.All

  # 2) Group devices into inactivity bands. Pure data shaping; no LLM.
  - id: categorize_by_age
    format: transform
    label: Group devices by how long they have been inactive
    detail: "Thresholds (days): {{ settings.warnDays }} / {{ settings.staleDays }} / {{ settings.retireDays }}."
    settings:
      kind: group-by-age
      source: "{{ load_devices.output }}"
      timestampField: lastSyncDateTime
      groups:
        - name: warn
          inactiveDaysAtLeast: "{{ settings.warnDays }}"
        - name: stale
          inactiveDaysAtLeast: "{{ settings.staleDays }}"
        - name: retire
          inactiveDaysAtLeast: "{{ settings.retireDays }}"

  - id: stale_by_compliance
    format: transform
    label: Count stale devices by compliance state
    detail: Breaks stale devices down by complianceState.
    settings:
      kind: count-by-field
      source: "{{ categorize_by_age.output.stale }}"
      field: complianceState
      buckets:
        - compliant
        - noncompliant
        - unknown

  - id: retire_by_compliance
    format: transform
    label: Count retirement candidates by compliance state
    detail: Breaks retirement candidates down by complianceState.
    settings:
      kind: count-by-field
      source: "{{ categorize_by_age.output.retire }}"
      field: complianceState
      buckets:
        - compliant
        - noncompliant
        - unknown

  - id: inactive_by_os
    format: transform
    label: Group warn-band devices by operating system
    detail: Shows whether early inactivity is concentrated by platform.
    settings:
      kind: group-by-field
      source: "{{ categorize_by_age.output.warn }}"
      field: operatingSystem
      missing: unknown

  - id: retire_by_owner_type
    format: transform
    label: Group retirement candidates by ownership
    detail: Separates corporate and personal device ownership where Graph provides it.
    settings:
      kind: group-by-field
      source: "{{ categorize_by_age.output.retire }}"
      field: managedDeviceOwnerType
      missing: unknown

  - id: oldest_devices
    format: transform
    label: Sample oldest inactive devices
    detail: Lists the oldest sync timestamps first for evidence in the report.
    settings:
      kind: sort-by
      source: "{{ categorize_by_age.output.retire }}"
      field: lastSyncDateTime
      direction: asc
      take: 10

  # 3) Optional LLM polish. Gated on availability so the agent still
  #    completes against synthetic mode without Ollama.
  - id: summarize
    format: llm
    label: Summarize findings with local LLM
    detail: Generates a short device hygiene report with review-first actions.
    settings:
      system: >-
        You are an Intune device hygiene reviewer for Microsoft 365 admins.
        Be concise, factual, and conservative. Do not recommend deleting or
        retiring devices solely because lastSyncDateTime is old. Treat stale
        sync as an investigation signal that must be checked against ownership,
        enrollment type, compliance state, replacement/offboarding records, and
        business context. Use only the supplied counts and samples.
      prompt: |-
        Total managed devices: {{ load_devices.output | size }}.
        Warn band (>= {{ settings.warnDays }} days): {{ categorize_by_age.output.warn | size }} devices.
        Stale band (>= {{ settings.staleDays }} days): {{ categorize_by_age.output.stale | size }} devices.
        Retire band (>= {{ settings.retireDays }} days): {{ categorize_by_age.output.retire | size }} devices.

        Stale compliance breakdown: {{ stale_by_compliance.output }}.
        Retirement-candidate compliance breakdown: {{ retire_by_compliance.output }}.
        Warn-band devices by operating system: {{ inactive_by_os.output }}.
        Retirement candidates by owner type: {{ retire_by_owner_type.output }}.
        Oldest retirement-candidate sample: {{ oldest_devices.output }}.

        Write a compact report with these sections:
        1. Main finding.
        2. What to verify before cleanup.
        3. Recommended next actions.

        Call out concentrations by OS, owner type, or compliance state when
        visible. If the retire band is empty, say that clearly and focus on
        monitoring the stale band.
      temperature: 0.2
      maxTokens: 420

# ─── what makes it an agent ────────────────────────────────────────────────
definition:
  # Install-time, user-configurable parameters. The runtime reads the declared
  # defaults; an install-time form lands in a later slice.
  settings:
    - id: warnDays
      label: Warn band (days)
      type: integer
      default: 30
      description: Devices inactive at least this many days enter the warn band.
    - id: staleDays
      label: Stale band (days)
      type: integer
      default: 90
      description: Devices inactive at least this many days enter the stale band.
    - id: retireDays
      label: Retire band (days)
      type: integer
      default: 180
      description: Devices inactive at least this many days are flagged for retirement.

  triggers:
    - id: manual
      kind: manual

  # Shape of the run record's `result` field. Renders against the
  # accumulated pipeline state.
  result:
    # LLM-generated headline — every run preflights an LLM provider, so the
    # `default` filter is purely defensive.
    summary: >-
      {{ summarize.output.text | default("Summary unavailable.") }}
    data:
      totalDevices: "{{ load_devices.output | size }}"
      inactiveCounts:
        warn: "{{ categorize_by_age.output.warn | size }}"
        stale: "{{ categorize_by_age.output.stale | size }}"
        retire: "{{ categorize_by_age.output.retire | size }}"
      buckets:
        warn: "{{ categorize_by_age.output.warn }}"
        stale: "{{ categorize_by_age.output.stale }}"
        retire: "{{ categorize_by_age.output.retire }}"
      breakdowns:
        staleByCompliance: "{{ stale_by_compliance.output }}"
        retireByCompliance: "{{ retire_by_compliance.output }}"
        inactiveByOs: "{{ inactive_by_os.output }}"
        retireByOwnerType: "{{ retire_by_owner_type.output }}"
      oldestRetireCandidates: "{{ oldest_devices.output }}"
      llmSummary: "{{ summarize.output.text }}"
      llmModel: "{{ summarize.output.model }}"
      thresholds:
        warnDays: "{{ settings.warnDays }}"
        staleDays: "{{ settings.staleDays }}"
        retireDays: "{{ settings.retireDays }}"
