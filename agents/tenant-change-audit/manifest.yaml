# yaml-language-server: $schema=../../schemas/agent-template.schema.json
#
# tenant-change-audit — investigator that surfaces what *changed* in the
# tenant recently and asks the LLM to point out the entries that warrant
# a closer look. A PowerShell script can dump the audit log; only an
# agent can read the dump and tell you which line matters.
descriptor:
  id: tenant-change-audit
  name: Tenant change audit
  description: Reviews recent directory audit entries by activity, category, result, actor, and target context to flag changes worth checking.
  version: 1.1.0
  author:
    name: OpenAdminOS
    handle: openadminos
    verified: true
  category: policies
  tier: agent
  requiresEntraTier: p1
  mode: read
  preferredModel: llama3.1:8b

skills:
  - id: load_audits
    format: graph
    label: Load recent directory audit entries
    detail: Reads the last directory audit events from Microsoft Graph.
    settings:
      method: GET
      path: /auditLogs/directoryAudits
      query:
        $top: "100"
        $orderby: activityDateTime desc
      select:
        - id
        - activityDateTime
        - activityDisplayName
        - category
        - result
        - initiatedBy
        - targetResources
      scopes:
        - AuditLog.Read.All
        - Directory.Read.All

  - id: by_activity
    format: transform
    label: Count entries by activity
    settings:
      kind: count-by-field
      source: "{{ load_audits.output }}"
      field: activityDisplayName

  - id: by_category
    format: transform
    label: Count entries by category
    settings:
      kind: count-by-field
      source: "{{ load_audits.output }}"
      field: category

  - id: by_result
    format: transform
    label: Count entries by result
    settings:
      kind: count-by-field
      source: "{{ load_audits.output }}"
      field: result

  - id: by_actor
    format: transform
    label: Count entries by actor
    detail: Groups entries by initiatedBy.user.userPrincipalName when available.
    settings:
      kind: count-by-field
      source: "{{ load_audits.output }}"
      field: initiatedBy.user.userPrincipalName

  - id: recent_sample
    format: transform
    label: Sample recent audit entries
    detail: Keeps the latest entries available as evidence for the report.
    settings:
      kind: sort-by
      source: "{{ load_audits.output }}"
      field: activityDateTime
      direction: desc
      take: 20

  - id: explain
    format: llm
    label: Identify the noteworthy changes
    detail: Two-paragraph readout — what's routine vs. what should be reviewed.
    settings:
      system: >-
        You are an Entra/Intune administrator's assistant. Be concise,
        factual, and conservative. Never invent activities or counts —
        only use the figures you are given. Highlight entries that look
        unusual (privileged role changes, new app consents, mass
        modifications, off-hours admin actions).
      prompt: |-
        Last {{ load_audits.output | size }} directory audit entries.

        By activity: {{ by_activity.output }}
        By category: {{ by_category.output }}
        By result: {{ by_result.output }}
        By actor: {{ by_actor.output }}
        Recent sample: {{ recent_sample.output }}

        Write a compact report with these sections:
        1. Main finding.
        2. Routine baseline.
        3. Changes to review.
        4. Recommended next action.

        Call out failed changes, privileged role changes, consent changes,
        app credential changes, mass edits, or one actor dominating the batch
        when visible. If the sample only shows routine changes, say that.
      temperature: 0.2
      maxTokens: 360

definition:
  triggers:
    - id: manual
      kind: manual
  result:
    summary: '{{ explain.output.text | default("Summary unavailable.") }}'
    data:
      total: "{{ load_audits.output | size }}"
      byActivity: "{{ by_activity.output }}"
      byCategory: "{{ by_category.output }}"
      byResult: "{{ by_result.output }}"
      byActor: "{{ by_actor.output }}"
      recentSample: "{{ recent_sample.output }}"
      llmSummary: "{{ explain.output.text }}"
      llmModel: "{{ explain.output.model }}"
