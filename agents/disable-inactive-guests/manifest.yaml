# yaml-language-server: $schema=../../schemas/agent-template.schema.json
descriptor:
  id: disable-inactive-guests
  name: Disable inactive guest accounts
  description: Surfaces guest accounts that have not signed in for 90+ days and disables them after typed diff confirmation.
  version: 1.0.0
  author:
    name: OpenAgents
    handle: openagents
    verified: false
  category: policies
  mode: write
  preferredModel: llama3.1:8b
skills:
  - id: load_guests
    format: graph
    label: Load guest accounts
    detail: Reads the tenant's guest users via Microsoft Graph.
    settings:
      method: GET
      path: /users
      query:
        $filter: "userType eq 'Guest'"
      select: [id, displayName, userPrincipalName, accountEnabled, signInActivity]
      scopes:
        - User.Read.All
        - AuditLog.Read.All
  - id: stale_guests
    format: transform
    label: Pick guests inactive for 90+ days
    settings:
      kind: filter-by-age
      source: "{{ load_guests.output }}"
      timestampField: signInActivity.lastSignInDateTime
      inactiveDaysAtLeast: 90
  - id: explain_plan
    format: llm
    label: Explain the disable plan
    detail: One-paragraph rationale a manager can read before approving.
    settings:
      system: >-
        You are a Microsoft 365 administrator's assistant. Be concise and
        factual. Never invent numbers — use only the figures you are given.
      prompt: |-
        About to disable {{ stale_guests.output | size }} guest accounts
        that have not signed in for 90+ days. Write a one-paragraph
        rationale a manager could read before approving the action.
      temperature: 0.2
      maxTokens: 200
  - id: disable_guests
    format: write
    label: Disable inactive guest accounts
    detail: PATCHes each guest with accountEnabled=false after typed confirmation.
    settings:
      kind: graph-write
      source: "{{ stale_guests.output }}"
      confirmationPhrase: "DISABLE {{ actions | size }} GUEST ACCOUNTS"
      scopes:
        - User.ReadWrite.All
      actionTemplate:
        label: "Disable {{ item.userPrincipalName }}"
        description: "Last sign-in {{ item.signInActivity.lastSignInDateTime | default('never') }}"
        severity: destructive
        request:
          method: PATCH
          path: "/users/{{ item.id }}"
          body:
            accountEnabled: false
definition:
  triggers:
    - id: manual
      kind: manual
  result:
    summary: '{{ explain_plan.output.text | default("Summary unavailable.") }}'
    data:
      total: "{{ stale_guests.output | size }}"
      llmModel: "{{ explain_plan.output.model }}"
