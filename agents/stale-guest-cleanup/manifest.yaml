# yaml-language-server: $schema=../../schemas/agent-template.schema.json
#
# stale-guest-cleanup — supersedes the deleted `disable-inactive-guests`.
# Reads enabled guest users, filters by sign-in age, cost-caps the
# action list, and for each candidate the LLM produces a one-line
# rationale that ends up in the diff confirmation. Disable is a
# typed-confirmation write step.
descriptor:
  id: stale-guest-cleanup
  name: Stale guest cleanup
  description: Builds a capped disable plan for enabled guest accounts with stale sign-in activity, external-state context, and per-guest rationale.
  version: 1.1.0
  minAppVersion: 0.1.0
  author:
    name: OpenAdminOS
    handle: openadminos
    verified: true
  category: policies
  tier: agent
  requiresEntraTier: p1
  mode: write
  preferredModel: llama3.1:8b

skills:
  - id: load_guests
    format: graph
    label: Load guest accounts
    detail: Reads guest users from Microsoft Graph.
    settings:
      method: GET
      path: /users
      query:
        $filter: "userType eq 'Guest' and accountEnabled eq true"
        $top: "500"
      select:
        - id
        - displayName
        - userPrincipalName
        - mail
        - accountEnabled
        - createdDateTime
        - signInActivity
        - externalUserState
        - externalUserStateChangeDateTime
      scopes:
        - User.Read.All
        - AuditLog.Read.All

  - id: stale
    format: transform
    label: Filter to guests idle beyond threshold
    settings:
      kind: filter-by-age
      source: "{{ load_guests.output }}"
      timestampField: signInActivity.lastSignInDateTime
      inactiveDaysAtLeast: "{{ settings.inactiveDays }}"

  - id: by_external_state
    format: transform
    label: Count stale guests by external state
    detail: Separates accepted, pending, and unknown external-user states.
    settings:
      kind: count-by-field
      source: "{{ stale.output }}"
      field: externalUserState

  - id: oldest_stale
    format: transform
    label: Sort stale guests by oldest sign-in
    detail: Oldest sign-ins are reviewed first and cap the write plan.
    settings:
      kind: sort-by
      source: "{{ stale.output }}"
      field: signInActivity.lastSignInDateTime
      direction: asc
      take: 50

  - id: rationale_each
    format: map
    label: Build a per-guest disable rationale
    detail: One LLM call per candidate; one-line explanation for the diff modal.
    settings:
      source: "{{ oldest_stale.output }}"
      as: guest
      do:
        - id: reason
          format: llm
          label: Explain why this guest should be disabled
          settings:
            system: >-
              You are a tenant cleanup advisor. Be terse and factual.
              One short sentence. Never invent dates or facts. Stale
              guest sign-in is a cleanup signal, not proof that the guest
              is safe to remove. Mention the check if the record is ambiguous.
            prompt: |-
              Guest {{ guest.displayName }} ({{ guest.userPrincipalName }}),
              external state: {{ guest.externalUserState }},
              external state changed: {{ guest.externalUserStateChangeDateTime }},
              last sign-in: {{ guest.signInActivity.lastSignInDateTime }},
              created: {{ guest.createdDateTime }}.

              In one sentence, say why disabling this guest is safe
              (or note the single thing the admin should check first).
            temperature: 0.1
            maxTokens: 80

  - id: disable
    format: write
    label: Disable each stale guest
    settings:
      kind: graph-write
      source: "{{ oldest_stale.output }}"
      confirmationPhrase: "DISABLE {{ oldest_stale.output | size }} GUESTS"
      summary: "Disabling {{ oldest_stale.output | size }} enabled guest accounts that have not signed in for {{ settings.inactiveDays }}+ days."
      scopes:
        - User.ReadWrite.All
      actionTemplate:
        label: "Disable {{ item.displayName }} ({{ item.userPrincipalName }})"
        severity: destructive
        metadata:
          userId: "{{ item.id }}"
          userPrincipalName: "{{ item.userPrincipalName }}"
          externalUserState: "{{ item.externalUserState }}"
          lastSignInDateTime: "{{ item.signInActivity.lastSignInDateTime }}"
        request:
          method: PATCH
          path: "/users/{{ item.id }}"
          body:
            accountEnabled: false

definition:
  settings:
    - id: inactiveDays
      label: Inactive guest threshold (days)
      type: integer
      default: 90
      description: Enabled guests inactive at least this many days are considered for disable.

  triggers:
    - id: manual
      kind: manual
  result:
    summary: 'Prepared disable actions for {{ oldest_stale.output | size }} guest account(s) inactive for {{ settings.inactiveDays }}+ days.'
    data:
      candidates: "{{ oldest_stale.output | size }}"
      totalStale: "{{ stale.output | size }}"
      totalGuests: "{{ load_guests.output | size }}"
      byExternalState: "{{ by_external_state.output }}"
      candidatesReviewed: "{{ oldest_stale.output }}"
      perGuestRationale: "{{ rationale_each.output }}"
      thresholds:
        inactiveDays: "{{ settings.inactiveDays }}"
