# yaml-language-server: $schema=../../schemas/agent-template.schema.json
#
# secure-score-prioritizer — pulls Secure Score control profiles and
# asks the LLM to rank control-profile review targets by impact/effort.
# The Secure Score portal lists everything; the value here is the
# triage that turns 200 recommendations into a prioritized week.
descriptor:
  id: secure-score-prioritizer
  name: Secure Score prioritizer
  description: Prioritizes Microsoft Secure Score control profiles by category, action type, effort signals, user impact, and max-score upside.
  version: 1.1.0
  author:
    name: OpenAdminOS
    handle: openadminos
    verified: true
  category: policies
  tier: agent
  requiresEntraTier: free
  mode: read
  preferredModel: llama3.1:8b

skills:
  - id: load_controls
    format: graph
    label: Load Secure Score control profiles
    detail: Reads the catalogue of Secure Score controls available on the tenant.
    settings:
      method: GET
      path: /security/secureScoreControlProfiles
      select:
        - id
        - title
        - controlCategory
        - maxScore
        - actionType
        - implementationCost
        - userImpact
        - threats
        - rank
        - remediation
      scopes:
        - SecurityEvents.Read.All

  - id: by_category
    format: transform
    label: Count controls by category
    settings:
      kind: count-by-field
      source: "{{ load_controls.output }}"
      field: controlCategory

  - id: by_action_type
    format: transform
    label: Count controls by action type
    detail: Separates configuration, review, and third-party action shapes where Secure Score provides them.
    settings:
      kind: count-by-field
      source: "{{ load_controls.output }}"
      field: actionType

  - id: by_implementation_cost
    format: transform
    label: Count controls by implementation cost
    detail: Shows the effort bands Microsoft attaches to the controls.
    settings:
      kind: count-by-field
      source: "{{ load_controls.output }}"
      field: implementationCost

  - id: by_user_impact
    format: transform
    label: Count controls by user impact
    detail: Shows whether recommended controls are expected to affect end users.
    settings:
      kind: count-by-field
      source: "{{ load_controls.output }}"
      field: userImpact

  - id: top_score_upside
    format: transform
    label: Sample highest max-score controls
    detail: Sorts controls by maxScore so the report can focus on larger point opportunities.
    settings:
      kind: sort-by
      source: "{{ load_controls.output }}"
      field: maxScore
      direction: desc
      take: 15

  - id: prioritize
    format: llm
    label: Rank recommendations
    detail: Top-five review list with reasoning and effort estimates.
    settings:
      system: >-
        You are a Microsoft 365 security advisor. Be concise and
        factual. Never invent controls or scores - only reference the
        ones you are given. These are Secure Score control profiles,
        not confirmed implementation gaps. Rank review targets by likely
        point upside, low implementation cost, low user impact, and security
        importance. Be explicit when live implementation status is not
        available in the supplied data.
      prompt: |-
        Here are the Secure Score control profiles available on this
        tenant ({{ load_controls.output | size }} total, by category:
        {{ by_category.output }}).

        By action type: {{ by_action_type.output }}.
        By implementation cost: {{ by_implementation_cost.output }}.
        By user impact: {{ by_user_impact.output }}.
        Highest max-score controls sample: {{ top_score_upside.output }}.

        Pick the top five controls to review first. For each:
        1. Control title.
        2. Why it matters.
        3. Effort / user-impact caveat.
        4. What evidence to check in the Secure Score portal before work starts.

        Finish with one "where to start tomorrow morning" recommendation.
      temperature: 0.2
      maxTokens: 700

definition:
  triggers:
    - id: manual
      kind: manual
  result:
    summary: '{{ prioritize.output.text | default("Summary unavailable.") }}'
    data:
      total: "{{ load_controls.output | size }}"
      byCategory: "{{ by_category.output }}"
      byActionType: "{{ by_action_type.output }}"
      byImplementationCost: "{{ by_implementation_cost.output }}"
      byUserImpact: "{{ by_user_impact.output }}"
      topScoreUpside: "{{ top_score_upside.output }}"
      llmSummary: "{{ prioritize.output.text }}"
      llmModel: "{{ prioritize.output.model }}"
