# yaml-language-server: $schema=../../schemas/agent-template.schema.json
#
# Agent Template manifest for compliance-overview.
#
# A YAML-only Agent Template (no companion TypeScript). The pipeline
# loads the tenant's managed-device inventory once, counts the devices
# by complianceState, optionally asks the LLM to summarise the result,
# and renders a final JSON shape the renderer can show to admins.
#
# Exercises the `compliance` category and the `count-by-field` transform
# kind. The LLM step turns the bucket counts into a one-paragraph posture
# summary that becomes the run's headline result.

descriptor:
  id: compliance-overview
  name: Compliance overview
  description: Reviews Intune compliance by state, operating system, ownership, enrollment, and stale inventory signals.
  version: 1.1.0
  author:
    name: OpenAdminOS
    handle: openadminos
    verified: true
  category: compliance
  tier: dashboard
  requiresEntraTier: free
  mode: read
  preferredModel: llama3.1:8b

# ─── pipeline ──────────────────────────────────────────────────────────────
skills:

  # 1) Load the managed-device inventory. Reused endpoint; cheap on the
  #    tenant since each device is only fetched once per run.
  - id: load_devices
    format: graph
    label: Load managed device inventory
    detail: Reads managedDevices from the active tenant.
    settings:
      method: GET
      path: /deviceManagement/managedDevices
      select:
        - id
        - deviceName
        - userPrincipalName
        - operatingSystem
        - complianceState
        - lastSyncDateTime
        - managedDeviceOwnerType
        - deviceEnrollmentType
        - managementState
      scopes:
        - DeviceManagementManagedDevices.Read.All

  # 2) Tally devices by complianceState. The bucket list is pinned so the
  #    output always has all three keys, even on a tenant that happens to
  #    have zero noncompliant or zero unknown devices — the result data
  #    shape stays stable across runs.
  - id: by_state
    format: transform
    label: Count devices by compliance state
    detail: Tabulates compliant / noncompliant / unknown counts.
    settings:
      kind: count-by-field
      source: "{{ load_devices.output }}"
      field: complianceState
      buckets:
        - compliant
        - noncompliant
        - unknown

  - id: by_os
    format: transform
    label: Count devices by operating system
    detail: Shows whether compliance drift is concentrated by platform.
    settings:
      kind: count-by-field
      source: "{{ load_devices.output }}"
      field: operatingSystem

  - id: by_owner_type
    format: transform
    label: Count devices by ownership
    detail: Separates corporate and personal device ownership where Graph provides it.
    settings:
      kind: count-by-field
      source: "{{ load_devices.output }}"
      field: managedDeviceOwnerType

  - id: by_enrollment_type
    format: transform
    label: Count devices by enrollment type
    detail: Shows whether compliance drift lines up with enrollment path.
    settings:
      kind: count-by-field
      source: "{{ load_devices.output }}"
      field: deviceEnrollmentType

  - id: stale_inventory
    format: transform
    label: Find stale inventory records
    detail: Flags devices that have not synced recently so compliance counts are interpreted carefully.
    settings:
      kind: filter-by-age
      source: "{{ load_devices.output }}"
      timestampField: lastSyncDateTime
      inactiveDaysAtLeast: "{{ settings.staleSyncDays }}"

  # 3) Optional LLM summary. Gated on availability so the agent still
  #    completes against synthetic mode without Ollama running.
  - id: summarize
    format: llm
    label: Summarize compliance posture
    detail: Two-sentence executive summary plus one prioritised action.
    settings:
      system: >-
        You are an Intune compliance reviewer. Be concise, factual, and
        conservative. Never invent numbers - use only the figures you are
        given. Treat stale inventory as a caveat before making compliance
        conclusions.
      prompt: |-
        Tenant managed devices: {{ load_devices.output | size }}.
        Compliant: {{ by_state.output.compliant }}.
        Noncompliant: {{ by_state.output.noncompliant }}.
        Unknown: {{ by_state.output.unknown }}.
        By OS: {{ by_os.output }}.
        By ownership: {{ by_owner_type.output }}.
        By enrollment: {{ by_enrollment_type.output }}.
        Stale inventory >= {{ settings.staleSyncDays }} days: {{ stale_inventory.output | size }}.

        Write a compact report with these sections:
        1. Main finding.
        2. Compliance drift signals.
        3. Recommended next action.

        Call out whether noncompliance or unknown status appears material,
        and whether stale inventory weakens the confidence of the counts.
      temperature: 0.2
      maxTokens: 360

# ─── what makes it an agent ────────────────────────────────────────────────
definition:
  settings:
    - id: staleSyncDays
      label: Stale inventory threshold (days)
      type: integer
      default: 14
      description: Devices that have not synced for at least this many days are flagged as stale inventory.

  triggers:
    - id: manual
      kind: manual

  # Shape of the run record's `result` field. Renders against the
  # accumulated pipeline state.
  result:
    # LLM-generated headline — every run preflights an LLM provider, so the
    # `default` filter is purely defensive.
    summary: >-
      {{ summarize.output.text | default("Summary unavailable.") }}
    data:
      totalDevices: "{{ load_devices.output | size }}"
      counts:
        compliant: "{{ by_state.output.compliant }}"
        noncompliant: "{{ by_state.output.noncompliant }}"
        unknown: "{{ by_state.output.unknown }}"
      byOs: "{{ by_os.output }}"
      byOwnerType: "{{ by_owner_type.output }}"
      byEnrollmentType: "{{ by_enrollment_type.output }}"
      staleInventoryCount: "{{ stale_inventory.output | size }}"
      llmSummary: "{{ summarize.output.text }}"
      llmModel: "{{ summarize.output.model }}"
      thresholds:
        staleSyncDays: "{{ settings.staleSyncDays }}"
