# yaml-language-server: $schema=../../schemas/agent-template.schema.json
#
# Agent Template manifest for offboarding-agent.
#
# Open-source replacement for Microsoft's retired Intune Device Offboarding
# Agent. Reads device inventory from both Intune (managedDevices) and Entra
# (devices), correlates by azureADDeviceId, and surfaces stale candidates
# the admin can offboard with typed confirmation. Unlike the Microsoft
# agent, this one actually executes the Intune retire — it is not a
# suggestion list.

descriptor:
  id: offboarding-agent
  name: Offboarding agent
  description: Builds a conservative stale-device offboarding plan from Intune sync, Entra sign-in, ownership, compliance, and trust signals, then retires devices after typed confirmation.
  version: 1.1.0
  minAppVersion: 0.1.0
  author:
    name: OpenAdminOS
    handle: openadminos
    verified: true
  category: devices
  requiresEntraTier: free
  mode: write
  preferredModel: llama3.1:8b

# ─── pipeline ──────────────────────────────────────────────────────────────
skills:

  # 1) Read managedDevices from Intune. azureADDeviceId is the join key
  #    against Entra; managementState lets us exclude devices already mid-retire.
  - id: load_intune_devices
    format: graph
    label: Load Intune managed devices
    detail: Reads managedDevices from the active tenant.
    settings:
      method: GET
      path: /deviceManagement/managedDevices
      select:
        - id
        - deviceName
        - userPrincipalName
        - operatingSystem
        - osVersion
        - lastSyncDateTime
        - enrolledDateTime
        - complianceState
        - azureADDeviceId
        - managementState
        - managedDeviceOwnerType
        - deviceEnrollmentType
        - manufacturer
        - model
      scopes:
        - DeviceManagementManagedDevices.Read.All

  # 2) Read Entra device records. `deviceId` here equals managedDevice.azureADDeviceId.
  #    approximateLastSignInDateTime is the staleness signal on the Entra side;
  #    per MS docs it can lag up to ~14 days, surfaced in the rationale.
  - id: load_entra_devices
    format: graph
    label: Load Entra device records
    detail: Reads /devices for cross-service correlation.
    settings:
      method: GET
      path: /devices
      select:
        - id
        - deviceId
        - displayName
        - accountEnabled
        - approximateLastSignInDateTime
        - operatingSystem
        - trustType
        - isManaged
      scopes:
        - Device.Read.All

  # 3) Correlate the two inventories and pick offboarding candidates.
  #    Strategy controls which signal must indicate staleness:
  #      both        -> stale in Intune sync AND stale in Entra sign-in
  #      intune-only -> stale in Intune sync (ignores Entra)
  #      entra-only  -> stale in Entra sign-in (ignores Intune)
  #    Devices already in flight (retirePending / retireIssued / wipePending /
  #    deletePending) are always excluded.
  - id: select_offboarding_candidates
    format: transform
    label: Select offboarding candidates
    detail: "Correlates Intune + Entra; flags devices stale by `{{ settings.strategy }}` past {{ settings.staleDays }} days."
    settings:
      kind: correlate-stale-devices
      intuneSource: "{{ load_intune_devices.output }}"
      entraSource: "{{ load_entra_devices.output }}"
      staleDays: "{{ settings.staleDays }}"
      strategy: "{{ settings.strategy }}"
      excludePersonalDevices: "{{ settings.excludePersonalDevices }}"

  - id: candidates_by_compliance
    format: transform
    label: Count candidates by compliance state
    detail: Shows whether candidates are compliant, noncompliant, or unknown.
    settings:
      kind: count-by-field
      source: "{{ select_offboarding_candidates.output }}"
      field: complianceState
      buckets:
        - compliant
        - noncompliant
        - unknown

  - id: candidates_by_os
    format: transform
    label: Group candidates by operating system
    detail: Surfaces platform concentration before retirement.
    settings:
      kind: group-by-field
      source: "{{ select_offboarding_candidates.output }}"
      field: operatingSystem
      missing: unknown

  - id: candidates_by_owner_type
    format: transform
    label: Group candidates by ownership
    detail: Confirms whether personal devices were excluded from the plan.
    settings:
      kind: group-by-field
      source: "{{ select_offboarding_candidates.output }}"
      field: managedDeviceOwnerType
      missing: unknown

  - id: candidates_by_trust_type
    format: transform
    label: Group candidates by Entra trust type
    detail: Separates Azure AD joined, hybrid, and unknown trust states.
    settings:
      kind: group-by-field
      source: "{{ select_offboarding_candidates.output }}"
      field: entraTrustType
      missing: unknown

  - id: oldest_candidates
    format: transform
    label: Sample oldest candidates
    detail: Lists the highest Intune inactivity ages first for confirmation evidence.
    settings:
      kind: sort-by
      source: "{{ select_offboarding_candidates.output }}"
      field: intuneInactiveDays
      direction: desc
      take: 10

  # 4) Plain-language rationale for the diff confirmation. Pulls in the
  #    admin's free-text instructions and the lag caveat on the Entra signal.
  - id: explain_plan
    format: llm
    label: Explain the offboarding plan
    detail: One-paragraph rationale shown alongside the typed-confirmation prompt.
    settings:
      system: >-
        You are an Intune device offboarding reviewer. Be conservative,
        factual, and explicit about evidence. This is a destructive plan:
        do not imply the action is safe merely because devices are stale.
        Use only the supplied counts, strategy, and samples. Honor the admin's
        instructions if any are provided.
      prompt: |-
        About to offboard {{ select_offboarding_candidates.output | size }} devices.
        Threshold: {{ settings.staleDays }} days. Strategy: {{ settings.strategy }}.
        Personal devices excluded: {{ settings.excludePersonalDevices }}.

        Candidate compliance breakdown: {{ candidates_by_compliance.output }}.
        Candidates by operating system: {{ candidates_by_os.output }}.
        Candidates by owner type: {{ candidates_by_owner_type.output }}.
        Candidates by Entra trust type: {{ candidates_by_trust_type.output }}.
        Oldest candidate sample: {{ oldest_candidates.output }}.

        Write a short change-ticket rationale with these sections:
        1. What will happen.
        2. Evidence used.
        3. Checks before approval.

        Include that Intune retire removes the management relationship and
        corporate data according to platform policy; it does not disable the
        Entra device object in this version. If the strategy uses the Entra
        signal, note that approximateLastSignInDateTime can lag up to about
        14 days. If the count is zero, say no retirement action is proposed.

        Admin instructions (may be empty):
        {{ settings.instructions | default("(none)") }}
      temperature: 0.2
      maxTokens: 420

  # 5) Emit one retire action per candidate. The runtime pauses here.
  - id: plan_offboarding
    format: write
    label: Build offboarding plan
    detail: One Intune retire action per candidate device. Entra disable is a follow-up.
    settings:
      kind: retire-managed-device
      source: "{{ select_offboarding_candidates.output }}"
      confirmationPhrase: "OFFBOARD {{ actions | size }} DEVICES"
      summary: >-
        {{ explain_plan.output.text | default("Offboard stale devices past the configured threshold.") }}
      scopes:
        - DeviceManagementManagedDevices.PrivilegedOperations.All
      actionTemplate:
        label: "Offboard {{ item.deviceName }}"
        description: "{{ item.userPrincipalName }} - {{ item.operatingSystem }} {{ item.osVersion | default('') }} - owner {{ item.managedDeviceOwnerType | default('unknown') }} - compliance {{ item.complianceState | default('unknown') }} - Intune inactive {{ item.intuneInactiveDays | default('n/a') }}d - Entra inactive {{ item.entraInactiveDays | default('n/a') }}d"
        severity: destructive
        metadata:
          deviceId: "{{ item.id }}"
          deviceName: "{{ item.deviceName }}"
          userPrincipalName: "{{ item.userPrincipalName }}"
          operatingSystem: "{{ item.operatingSystem }}"
          osVersion: "{{ item.osVersion }}"
          complianceState: "{{ item.complianceState }}"
          managedDeviceOwnerType: "{{ item.managedDeviceOwnerType }}"
          deviceEnrollmentType: "{{ item.deviceEnrollmentType }}"
          manufacturer: "{{ item.manufacturer }}"
          model: "{{ item.model }}"
          lastSyncDateTime: "{{ item.lastSyncDateTime }}"
          intuneInactiveDays: "{{ item.intuneInactiveDays }}"
          azureADDeviceId: "{{ item.azureADDeviceId }}"
          entraObjectId: "{{ item.entraObjectId }}"
          entraTrustType: "{{ item.entraTrustType }}"
          entraAccountEnabled: "{{ item.entraAccountEnabled }}"
          approximateLastSignInDateTime: "{{ item.approximateLastSignInDateTime }}"
          entraInactiveDays: "{{ item.entraInactiveDays }}"

# ─── what makes it an agent ────────────────────────────────────────────────
definition:
  settings:
    - id: staleDays
      label: Stale threshold (days)
      type: integer
      default: 180
      description: A device must exceed this many days of inactivity on the selected signal(s) to be flagged.

    - id: strategy
      label: Correlation strategy
      type: string
      default: both
      description: "How to combine the Intune and Entra staleness signals. One of: both (stale in both), intune-only (only Intune sync matters), entra-only (only Entra sign-in matters)."

    - id: excludePersonalDevices
      label: Exclude personal devices
      type: boolean
      default: true
      description: Excludes Intune devices whose managedDeviceOwnerType is personal before the retire plan is built.

    - id: instructions
      label: Custom instructions
      type: string
      default: ""
      description: Optional free-text guidance fed to the rationale step. Use this to encode org-specific rules (for example, exclude kiosk devices, prefer Apple BYOD, etc.).

  triggers:
    - id: manual
      kind: manual
