# yaml-language-server: $schema=../../schemas/agent-template.schema.json
#
# risky-sign-in-triage — pulls Entra ID risky users and asks the LLM to
# classify each one (likely-FP / likely-compromise / unclear) with
# reasoning. Uses the `map` step: one LLM call per risky user lets the
# model reason about each event in isolation with shared context.
descriptor:
  id: risky-sign-in-triage
  name: Risky user triage
  description: Classifies recent Entra risky users by risk level, state, detail, and processing status with conservative next-step guidance.
  version: 1.1.0
  author:
    name: OpenAdminOS
    handle: openadminos
    verified: true
  category: policies
  tier: agent
  requiresEntraTier: p2
  mode: read
  preferredModel: llama3.1:8b

skills:
  - id: load_risky
    format: graph
    label: Load risky users
    detail: Reads Entra ID risky users that are currently above none risk.
    settings:
      method: GET
      path: /identityProtection/riskyUsers
      query:
        $top: "50"
        $filter: "riskLevel ne 'none'"
      select:
        - id
        - userPrincipalName
        - userDisplayName
        - riskLevel
        - riskState
        - riskDetail
        - riskLastUpdatedDateTime
        - isDeleted
        - isProcessing
      scopes:
        - IdentityRiskyUser.Read.All

  - id: by_risk_level
    format: transform
    label: Count risky users by risk level
    detail: Breaks the batch down by low, medium, and high user risk.
    settings:
      kind: count-by-field
      source: "{{ load_risky.output }}"
      field: riskLevel
      buckets:
        - low
        - medium
        - high

  - id: by_risk_state
    format: transform
    label: Count risky users by state
    detail: Shows whether users are active, remediated, dismissed, or already confirmed compromised.
    settings:
      kind: count-by-field
      source: "{{ load_risky.output }}"
      field: riskState

  - id: by_risk_detail
    format: transform
    label: Count risky users by detail
    detail: Surfaces whether risk is admin-confirmed, user-remediated, hidden, or still unknown.
    settings:
      kind: count-by-field
      source: "{{ load_risky.output }}"
      field: riskDetail

  - id: by_processing_status
    format: transform
    label: Count risky users by processing status
    detail: Separates users still being processed by Identity Protection from records ready for review.
    settings:
      kind: count-by-field
      source: "{{ load_risky.output }}"
      field: isProcessing

  - id: recent_risky
    format: transform
    label: Take most recently updated risky users
    detail: Sorts by riskLastUpdatedDateTime so per-user LLM calls focus on the freshest records.
    settings:
      kind: sort-by
      source: "{{ load_risky.output }}"
      field: riskLastUpdatedDateTime
      direction: desc
      take: 20

  - id: triage_each
    format: map
    label: Triage each risky user individually
    detail: One LLM call per recently updated risky user; classifies and explains.
    settings:
      source: "{{ recent_risky.output }}"
      as: subject
      do:
        - id: classify
          format: llm
          label: Classify this risky user
          settings:
            system: >-
              You are an Entra Identity Protection analyst. Be concise
              and conservative. Never invent details. Classify each
              risky-user record as one of: `likely-false-positive`,
              `likely-compromise`, or `unclear-needs-review`. Default
              to `unclear-needs-review` when signals are ambiguous.
              Risk state and detail matter: dismissed/remediated users
              are usually lower priority; confirmed compromised or high
              active risk should be reviewed immediately.
            prompt: |-
              Risky user record:
              - User: {{ subject.userPrincipalName }}
              - Display name: {{ subject.userDisplayName }}
              - Risk level: {{ subject.riskLevel }}
              - Risk state: {{ subject.riskState }}
              - Risk detail: {{ subject.riskDetail }}
              - Last updated: {{ subject.riskLastUpdatedDateTime }}
              - Deleted user: {{ subject.isDeleted }}
              - Still processing: {{ subject.isProcessing }}

              Return three short lines:
              1. `classification: <likely-false-positive | likely-compromise | unclear-needs-review>`
              2. `reasoning: <one short sentence>`
              3. `next-step: <dismiss | confirm-compromise | review | reset-credentials-and-revoke | wait-for-processing>`
            temperature: 0.1
            maxTokens: 150

  - id: summarize
    format: llm
    label: Roll up triage results
    detail: Compact executive summary of the risky-user batch.
    settings:
      system: >-
        You are an Entra security analyst. Be concise, factual, and
        avoid alarm. Never invent counts. Treat Identity Protection
        risky-user records as triage signals, not proof of compromise
        unless the supplied state or detail says so.
      prompt: |-
        Total risky users: {{ load_risky.output | size }}.
        Triaged most-recent users: {{ recent_risky.output | size }}.
        By risk level: {{ by_risk_level.output }}.
        By risk state: {{ by_risk_state.output }}.
        By risk detail: {{ by_risk_detail.output }}.
        By processing status: {{ by_processing_status.output }}.

        Per-user triage:
        {{ triage_each.output }}

        Write a compact report with these sections:
        1. Main finding.
        2. Highest-priority users.
        3. Recommended next actions.

        Call out high active risk, confirmed compromise, still-processing
        records, or already remediated/dismissed records when present. If
        there are more risky users than triaged users, say the report focused
        on the most recently updated records.
      temperature: 0.2
      maxTokens: 420

definition:
  triggers:
    - id: manual
      kind: manual
  result:
    summary: '{{ summarize.output.text | default("Summary unavailable.") }}'
    data:
      total: "{{ load_risky.output | size }}"
      triaged: "{{ recent_risky.output | size }}"
      byRiskLevel: "{{ by_risk_level.output }}"
      byRiskState: "{{ by_risk_state.output }}"
      byRiskDetail: "{{ by_risk_detail.output }}"
      byProcessingStatus: "{{ by_processing_status.output }}"
      triagedUsers: "{{ recent_risky.output }}"
      byItem: "{{ triage_each.output }}"
      llmSummary: "{{ summarize.output.text }}"
      llmModel: "{{ summarize.output.model }}"
