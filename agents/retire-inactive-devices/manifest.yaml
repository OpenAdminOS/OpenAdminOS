# yaml-language-server: $schema=../../schemas/agent-template.schema.json
#
# Agent Template manifest for retire-inactive-devices.
#
# This is the companion write-mode agent to find-inactive-devices. The
# pipeline loads the managed-device inventory, filters to devices that have
# been inactive past the configured threshold, then emits a write step that
# produces one retire action per candidate. The runtime pauses on the plan,
# requires typed confirmation, and only calls Microsoft Graph during apply
# when the host has gated real writes.

descriptor:
  id: retire-inactive-devices
  name: Retire inactive devices
  description: Companion to Find inactive devices. Retires devices that have not synced in 180+ days after typed diff confirmation.
  version: 1.0.0
  author:
    name: OpenAdminOS
    handle: openadminos
    verified: true
  category: devices
  requiresEntraTier: free
  mode: write
  preferredModel: llama3.1:8b

# ─── pipeline ──────────────────────────────────────────────────────────────
skills:

  # 1) Read managedDevices from the active tenant.
  - id: load_devices
    format: graph
    label: Load managed device inventory
    detail: Reads managedDevices from the active tenant.
    settings:
      method: GET
      path: /deviceManagement/managedDevices
      select:
        - id
        - deviceName
        - userPrincipalName
        - operatingSystem
        - osVersion
        - lastSyncDateTime
        - enrolledDateTime
        - complianceState
      scopes:
        - DeviceManagementManagedDevices.Read.All

  # 2) Filter to devices that exceed the retire threshold. Pure data shaping.
  - id: select_retire_candidates
    format: transform
    label: Select retire candidates
    detail: "Devices inactive >= {{ settings.retireDays }} days."
    settings:
      kind: filter-by-age
      source: "{{ load_devices.output }}"
      timestampField: lastSyncDateTime
      inactiveDaysAtLeast: "{{ settings.retireDays }}"

  # 3) Ask the local LLM to write a plain-language rationale the admin
  #    will see alongside the typed-confirmation prompt. Runs before the
  #    write step so its output is available when the plan is rendered.
  - id: explain_plan
    format: llm
    label: Explain the retirement plan
    detail: One-paragraph rationale to surface alongside the confirmation prompt.
    settings:
      system: >-
        You are a Microsoft 365 administrator's assistant. Be concise and
        factual. Write a single short paragraph (3 sentences max) that an
        admin can paste into a change ticket. Never invent numbers; use only
        the figures you are given.
      prompt: |-
        About to retire {{ select_retire_candidates.output | size }} managed devices
        that have not synced in at least {{ settings.retireDays }} days.

        Write a short paragraph explaining what the admin is approving:
        - The count and the threshold
        - Why retiring stale devices reduces attack surface
        - One sentence on what happens when a device is retired (Intune unenrolls it
          but the device itself is not wiped unless the policy also wipes)
      temperature: 0.2
      maxTokens: 240

  # 4) Emit one retire action per candidate. The runtime pauses here.
  - id: plan_retirements
    format: write
    label: Build retire plan
    detail: Produces one retire action per candidate device.
    settings:
      kind: retire-managed-device
      source: "{{ select_retire_candidates.output }}"
      confirmationPhrase: "RETIRE {{ actions | size }} DEVICES"
      summary: >-
        {{ explain_plan.output.text | default("Retire devices inactive past the configured threshold.") }}
      scopes:
        - DeviceManagementManagedDevices.PrivilegedOperations.All
      actionTemplate:
        label: "Retire {{ item.deviceName }}"
        description: "{{ item.userPrincipalName }} - {{ item.operatingSystem }} - last sync {{ item.lastSyncDateTime }}"
        severity: destructive
        metadata:
          deviceId: "{{ item.id }}"
          deviceName: "{{ item.deviceName }}"
          userPrincipalName: "{{ item.userPrincipalName }}"
          operatingSystem: "{{ item.operatingSystem }}"
          lastSyncDateTime: "{{ item.lastSyncDateTime }}"

# ─── what makes it an agent ────────────────────────────────────────────────
definition:
  settings:
    - id: retireDays
      label: Retire threshold (days)
      type: integer
      default: 180
      description: Devices inactive at least this many days are flagged for retirement.

  triggers:
    - id: manual
      kind: manual
