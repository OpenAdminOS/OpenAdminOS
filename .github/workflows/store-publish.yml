name: Microsoft Store publish

# Submits the Windows .appx attached to a published GitHub release to
# the Microsoft Store via Microsoft's official `msstore` Developer CLI.
#
# Triggers:
#   - release: published   (you click "Publish release" in the GitHub UI;
#                           that's the human gate before the package goes
#                           to Partner Center.)
#   - workflow_dispatch    (re-run by hand against a specific tag.)
#
# Required secrets (configure in repo Settings -> Secrets and variables -> Actions):
#   PARTNER_CENTER_TENANT_ID     - Azure AD tenant ID associated with Partner Center.
#   PARTNER_CENTER_CLIENT_ID     - App registration client ID, granted Manager role
#                                  in Partner Center -> Account settings -> User management.
#   PARTNER_CENTER_CLIENT_SECRET - Client secret for the app registration.
#   MS_STORE_APP_ID              - 12-character Store product ID, shown in Partner Center
#                                  under App identity after the first submission.
#
# All four must be present; the job skips cleanly if any is missing so the
# repo keeps working before the one-time Partner Center setup is done.
# See docs/RELEASING.md for the step-by-step onboarding.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to submit (e.g. v0.1.5). Defaults to the latest published release."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: store-publish-${{ github.event.release.tag_name || inputs.tag || 'manual' }}
  cancel-in-progress: false

jobs:
  submit:
    name: Submit .appx to Microsoft Store
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check required secrets
        id: gate
        shell: bash
        env:
          TENANT_ID: ${{ secrets.PARTNER_CENTER_TENANT_ID }}
          CLIENT_ID: ${{ secrets.PARTNER_CENTER_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}
          APP_ID: ${{ secrets.MS_STORE_APP_ID }}
        run: |
          missing=""
          [ -z "$TENANT_ID" ]     && missing="$missing PARTNER_CENTER_TENANT_ID"
          [ -z "$CLIENT_ID" ]     && missing="$missing PARTNER_CENTER_CLIENT_ID"
          [ -z "$CLIENT_SECRET" ] && missing="$missing PARTNER_CENTER_CLIENT_SECRET"
          [ -z "$APP_ID" ]        && missing="$missing MS_STORE_APP_ID"
          if [ -n "$missing" ]; then
            echo "::warning::Skipping Store submission. Missing secrets:$missing"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release tag
        if: steps.gate.outputs.skip != 'true'
        id: tag
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          # Tag values are quoted into env vars to avoid expression
          # injection in this shell block.
          if [ -n "$EVENT_TAG" ]; then
            tag="$EVENT_TAG"
          elif [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName)"
          fi
          # Defence-in-depth: only allow vMAJOR.MINOR.PATCH(-suffix)? tags.
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "::error::Refusing to use tag '$tag' (must look like v1.2.3)"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $tag"

      - name: Download .appx from release
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p package
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.appx" \
            --dir package
          ls -la package

      - name: Install Microsoft Store Developer CLI
        if: steps.gate.outputs.skip != 'true'
        uses: microsoft/setup-msstore-cli@v1

      - name: Configure msstore credentials
        if: steps.gate.outputs.skip != 'true'
        shell: pwsh
        env:
          TENANT_ID: ${{ secrets.PARTNER_CENTER_TENANT_ID }}
          CLIENT_ID: ${{ secrets.PARTNER_CENTER_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}
          SELLER_ID: "82025760"
        run: |
          msstore reconfigure `
            --tenantId $env:TENANT_ID `
            --sellerId $env:SELLER_ID `
            --clientId $env:CLIENT_ID `
            --clientSecret $env:CLIENT_SECRET

      - name: Submit package to Microsoft Store
        if: steps.gate.outputs.skip != 'true'
        shell: pwsh
        env:
          APP_ID: ${{ secrets.MS_STORE_APP_ID }}
        run: |
          $appx = Get-ChildItem -Path package -Filter *.appx | Select-Object -First 1
          if (-not $appx) {
            Write-Error "No .appx found in package/ for this release."
            exit 1
          }
          Write-Host "Submitting $($appx.FullName) for app $env:APP_ID"
          msstore publish $appx.FullName --appId $env:APP_ID
