name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'web/**'
  pull_request:
    paths-ignore:
      - 'web/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt into Node 24 for JavaScript actions ahead of GitHub's June 2026
  # forced cutover. Silences the EOL warnings the runner emits otherwise.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: typecheck, qa, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENAGENTS_QA_SKILL_REPO: https://github.com/merill/msgraph.git
      OPENAGENTS_QA_SKILL_REF: main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm version
        run: npm install -g npm@11.6.2

      - name: Cache msgraph skill
        uses: actions/cache@v4
        with:
          path: .qa-cache/msgraph
          key: msgraph-skill-${{ env.OPENAGENTS_QA_SKILL_REF }}

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Resolve msgraph skill
        run: |
          eval "$(bash scripts/setup-qa.sh)"
          echo "MSGRAPH_SKILL_DIR=$MSGRAPH_SKILL_DIR" >> "$GITHUB_ENV"

      - name: Graph QA gate
        run: npm run qa

      - name: Regenerate registry index
        run: npm run registry:index

      - name: Verify registry index is up to date
        run: |
          git diff --exit-code agents/index.json || \
            (echo "agents/index.json is out of date — run npm run registry:index and commit" && exit 1)

      - name: Build
        run: npm run build
