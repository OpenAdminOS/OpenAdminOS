name: Release

# Builds platform-specific installers and uploads them to a draft GitHub
# release.
#
# Triggers:
#   - Tag push matching v*.*.* (the canonical "cut a release" gesture)
#   - workflow_dispatch (re-run from the Actions tab without retagging)
#
# Outputs:
#   - Windows: an unsigned .appx build for packaging validation only.
#     It is not uploaded as a workflow artifact or GitHub release asset
#     until the Windows signing/distribution path is ready.
#   - macOS (Apple Silicon for v0.1): notarized + signed .dmg + .zip
#     plus latest-mac.yml for electron-updater auto-update.
#
# Secrets required on the repo or org:
#   macOS:  CSC_LINK, CSC_KEY_PASSWORD, APPLE_API_KEY,
#           APPLE_API_KEY_ID, APPLE_API_ISSUER
#   (Windows AppX is unsigned in CI and is not published.)
#
# All `GITHUB_TOKEN` use comes from the auto-provided actions token.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # Opt into Node 24 for JavaScript actions ahead of GitHub's June 2026
  # forced cutover. Silences the EOL warnings the runner emits otherwise.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows-appx:
    name: Windows AppX (build only)
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build AppX
        # --publish never: we don't upload from electron-builder; the
        # AppX is only built to validate the package path until Windows
        # signing/distribution is ready.
        run: npm run dist -w @openadminos/desktop -- --win --publish never

      - name: Verify AppX build output
        shell: pwsh
        run: |
          $appx = Get-ChildItem -Path apps/desktop/release -Filter *.appx | Select-Object -First 1
          if (-not $appx) {
            Write-Error "Windows build completed but no .appx was produced."
            exit 1
          }
          Write-Host "Built $($appx.Name); not uploading it as an artifact."

  macos-arm64:
    name: macOS (Apple Silicon) — signed + notarized
    runs-on: macos-14
    timeout-minutes: 30
    env:
      # electron-builder reads these to authenticate notarization +
      # certificate import. CSC_LINK can be a https URL or a base64
      # blob; we use the base64 path so no external storage is needed.
      # APPLE_TEAM_ID is not secret (it's printed on the cert) so it
      # lives inline rather than in repo secrets.
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_TEAM_ID: "D259ULY2B4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Write App Store Connect API key
        # electron-builder expects APPLE_API_KEY to be a path to a .p8
        # file on disk. We materialize the secret contents to a tempfile
        # and rewrite APPLE_API_KEY to point at it.
        if: ${{ env.APPLE_API_KEY_ID != '' }}
        env:
          APPLE_API_KEY_CONTENTS: ${{ secrets.APPLE_API_KEY }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_CONTENTS" > "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Disable signing if secrets are missing
        # Lets the release workflow run end-to-end on a forked or
        # secrets-less repo for verification. Artifacts won't be
        # publishable but the build path itself is exercised.
        if: ${{ env.CSC_LINK == '' }}
        run: |
          echo "CSC_LINK=" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=" >> "$GITHUB_ENV"
          echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"

      - name: Build .dmg + .zip (signed + notarized when secrets present)
        # Arch is declared in package.json build.mac.target, so we only
        # pass --mac on the CLI; passing --arm64 here would be redundant
        # and (with some electron-builder versions) override the config.
        run: npm run dist -w @openadminos/desktop -- --mac --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/latest-mac.yml
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish release
    needs: [windows-appx, macos-arm64]
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        # TAG_NAME is sourced from github.ref_name via env so it's a
        # plain $VAR shell expansion, not a templated string — keeps
        # the workflow injection-safe per
        # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Refuse anything that isn't strict semver — defence in depth
          # against an attacker pushing a tag like "v0.1.8;evil" to a
          # fork PR. (We already gate on refs/tags/v* above, but a
          # belt-and-braces second check is cheap.)
          if ! printf '%s' "$TAG_NAME" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+([.-][[:alnum:].-]+)?$'; then
            echo "::error::Refusing to extract notes — tag '$TAG_NAME' does not match strict semver." >&2
            exit 1
          fi
          version="${TAG_NAME#v}"
          notes=$(awk -v ver="$version" '
            BEGIN { capture = 0 }
            /^## \[/ {
              if (capture == 1) { exit }
              if ($0 ~ ("^## \\[" ver "\\]")) { capture = 1; next }
            }
            capture == 1 { print }
          ' CHANGELOG.md)
          if [ -z "$notes" ]; then
            echo "::warning::No CHANGELOG section found for $version — falling back to auto-generated notes."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            {
              echo 'body<<RELEASE_NOTES_EOF'
              printf '%s\n' "$notes"
              echo RELEASE_NOTES_EOF
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release (with CHANGELOG body)
        if: ${{ steps.notes.outputs.found == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          make_latest: true
          body: ${{ steps.notes.outputs.body }}
          files: |
            artifacts/macos-arm64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release (fallback auto-generated)
        if: ${{ steps.notes.outputs.found != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          make_latest: true
          generate_release_notes: true
          files: |
            artifacts/macos-arm64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
