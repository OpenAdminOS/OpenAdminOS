name: Release prep

# Workflow_dispatch entry point for cutting a release. Bumps every
# workspace package.json + cross-workspace dep ref to the next version,
# rolls CHANGELOG.md so the [Unreleased] section becomes a dated
# [X.Y.Z] section, regenerates the lockfile, and opens a PR. When that
# PR merges to main, .github/workflows/auto-tag.yml fires, pushes the
# matching tag, and the existing release.yml builds and publishes a
# draft GitHub release.
#
# Defaults to "patch" — matches the project's v0.1.x line discipline.
# Set bump to "minor" or "major" only when intentionally changing line.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        type: choice
        required: true
        default: "patch"
        options:
          - patch
          - minor
          - major
      explicit_version:
        description: "Optional: explicit version like 0.1.5 (overrides bump)"
        type: string
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Read current version
        id: current
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Bump versions + roll CHANGELOG
        env:
          BUMP_TYPE: ${{ inputs.bump }}
          EXPLICIT_VERSION: ${{ inputs.explicit_version }}
        run: node scripts/prepare-release.mjs

      - name: Read new version
        id: next
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Install (regenerate lockfile)
        run: npm install --no-audit --no-fund

      - name: Open release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.next.outputs.version }}
          OLD_VERSION: ${{ steps.current.outputs.version }}
        run: |
          set -euo pipefail
          BRANCH="release/v${NEW_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "release: v${NEW_VERSION}"
          git push -u origin "$BRANCH"

          # The CHANGELOG diff is the most important part of the review,
          # so we inline a small body that points at it directly. The
          # full diff is one click away in the PR.
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "release: v${NEW_VERSION}" \
            --body "Auto-generated by release-prep workflow.

          Bumped \`v${OLD_VERSION}\` → \`v${NEW_VERSION}\`.

          Review the CHANGELOG roll (the \`[Unreleased]\` section becomes \`[${NEW_VERSION}] - $(date -u +%Y-%m-%d)\`) and the version bumps across workspace package.json files. When this merges to main, \`auto-tag.yml\` pushes \`v${NEW_VERSION}\` and \`release.yml\` builds the signed installers."
