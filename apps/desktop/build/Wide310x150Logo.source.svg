<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 150">
  <!-- AppX Wide310x150Logo.png source. 310x150 wide tile.
       Rasterize: rsvg-convert -w 310 -h 150 Wide310x150Logo.source.svg -o Wide310x150Logo.png -->
  <rect width="310" height="150" fill="#0a0a0c"/>
  <g transform="translate(22 30)">
    <rect x="0" y="0" width="90" height="90" rx="20" ry="20" fill="#1c1917"/>
    <circle cx="45" cy="45" r="25" fill="none" stroke="#e8a87c" stroke-width="5"/>
    <circle cx="45" cy="45" r="8.5" fill="#e8a87c"/>
  </g>
  <text x="135" y="78" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="20" font-weight="600" letter-spacing="-0.5" fill="#f5f5f5">
    Open Agents
  </text>
  <text x="135" y="100" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="11" font-weight="400" fill="#9a958e">
    Local-first M365 agents
  </text>
</svg>
