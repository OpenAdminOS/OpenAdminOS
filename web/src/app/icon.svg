<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    Favicon. 32x32 viewBox so it renders cleanly at 16x16 in browser
    tabs. Drops the cursor (would be a single pixel at favicon size)
    and uses a chunkier chevron stroke than the full app icon — the
    chevron alone is the strongest identity at small sizes.
  -->
  <rect width="32" height="32" rx="7" ry="7" fill="#e8a87c"/>
  <path d="M 10 9 L 21 16 L 10 23"
        fill="none"
        stroke="#1c1917"
        stroke-width="4"
        stroke-linejoin="round"
        stroke-linecap="round"/>
</svg>
